# XSS Platform — Nginx 配置
# 文件路径：/etc/nginx/sites-available/xss-platform
# 启用：sudo ln -s /etc/nginx/sites-available/xss-platform /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name xss.hackerchen.com;  # 替换为你的域名

    # 强制跳转 HTTPS（申请 SSL 证书后取消注释）
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

